{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<section class="hero-layout">
  <div class="hero-copy">
    <p class="eyebrow">Create Account</p>
    <h1>Create Account</h1>
    <p class="lede">
      Make an account to rent movies.
    </p>
  </div>

  <div class="panel auth-panel">
    <h2>Create Account</h2>
    <form method="post" class="stack-form">
      <label for="username">Username</label>
      <input id="username" type="text" name="username" placeholder="Movie fan" required>

      <label for="email">Email</label>
      <input id="email" type="email" name="email" placeholder="you@example.com" required>

      <label for="password">Password</label>
      <input id="password" type="password" name="password" placeholder="Create password" required>

      <button type="submit" class="button-primary">Register</button>
    </form>
    <p class="helper-text">
      Already registered? <a href="{{ url_for('login') }}">Sign in</a>.
    </p>
  </div>
</section>
{% endblock %}
